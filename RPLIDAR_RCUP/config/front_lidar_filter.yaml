front_lidar_filter:
  ros__parameters:
    use_sensor_data_qos: true
    filter1:
      name: keep_front_hemisphere
      type: laser_filters/LaserScanAngularBoundsFilter
      params:
        lower_angle: -1.4835 
        upper_angle: 1.4835   
    filter2:
      name: speckle_filter
      type: laser_filters/LaserScanSpeckleFilter
      params:
        filter_type: 1              
        max_range: 10.0              
        max_range_difference: 0.25  
        filter_window: 3